<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Pokemon Battle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f0f0f0;
    }

    h1 { text-align: center; color: #333; }

    /* --- Ecran de sélection --- */
    #selection {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    #selection input {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    #liste-pokemon {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .carte-pokemon {
      background: #eee;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      width: 90px;
    }

    .carte-pokemon:hover { border-color: #999; }
    .carte-pokemon.selectionne { border-color: purple; background: #e0d8ff; }
    .carte-pokemon img { width: 60px; height: 60px; }
    .carte-pokemon p { font-size: 12px; margin: 4px 0 0; text-transform: capitalize; }

    button {
      display: block;
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      font-size: 16px;
      background: purple;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:disabled { background: #aaa; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #3a0080; }

    /* --- Ecran de combat --- */
    #combat { display: none; background: white; padding: 20px; border-radius: 10px; }

    .combattant {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .combattant img { width: 80px; height: 80px; }

    .infos-combat { flex: 1; }
    .infos-combat p { margin: 2px 0; font-size: 14px; text-transform: capitalize; font-weight: bold; }

    .barre-bg {
      background: #ddd;
      height: 12px;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 4px;
    }

    .barre-hp {
      height: 100%;
      border-radius: 99px;
      background: green;
      transition: width 0.4s;
    }

    .hp-texte { font-size: 12px; color: #555; margin-top: 2px; }

    #grille-attaques {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 15px 0;
    }

    .bouton-attaque {
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 8px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      width: auto;
    }

    .bouton-attaque:hover:not(:disabled) { background: #e0e0e0; }
    .bouton-attaque b { display: block; text-transform: capitalize; margin-bottom: 2px; }
    .bouton-attaque span { color: #666; font-size: 11px; }

    #journal {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
      min-height: 50px;
    }

    /* --- Ecran résultat --- */
    #resultat { display: none; text-align: center; background: white; padding: 30px; border-radius: 10px; }
    #resultat h2 { font-size: 28px; }
  </style>
</head>
<body>

<h1>⚡ Pokemon Battle</h1>

<!-- ECRAN 1 : Choisir son Pokemon -->
<div id="selection">
  <p><strong>Choisis ton Pokemon :</strong></p>
  <input type="text" id="recherche" placeholder="Chercher un Pokemon..." oninput="filtrer(this.value)" />
  <div id="liste-pokemon">Chargement...</div>
  <button id="btn-combat" disabled onclick="demarrerCombat()">Combattre !</button>
</div>

<!-- ECRAN 2 : Combat -->
<div id="combat">
  <div class="combattant">
    <img id="img-joueur" src="" alt="" />
    <div class="infos-combat">
      <p id="nom-joueur">—</p>
      <div class="barre-bg"><div class="barre-hp" id="barre-joueur"></div></div>
      <div class="hp-texte" id="hp-joueur">300 / 300</div>
    </div>
  </div>

  <div class="combattant">
    <img id="img-bot" src="" alt="" />
    <div class="infos-combat">
      <p id="nom-bot">—</p>
      <div class="barre-bg"><div class="barre-hp" id="barre-bot"></div></div>
      <div class="hp-texte" id="hp-bot">300 / 300</div>
    </div>
  </div>

  <div id="grille-attaques"></div>
  <div id="journal">Choisis une attaque !</div>
</div>

<!-- ECRAN 3 : Résultat -->
<div id="resultat">
  <div id="res-emoji" style="font-size:60px"></div>
  <h2 id="res-titre"></h2>
  <p id="res-texte"></p>
  <button onclick="rejouer()">Rejouer</button>
</div>

<script>
  // LISTE DE POKEMON (on en prend 30 de base)
  const LISTE_NOMS = [
    'pikachu', 'charizard', 'blastoise', 'venusaur', 'mewtwo',
    'gengar', 'snorlax', 'dragonite', 'alakazam', 'machamp',
    'eevee', 'arcanine', 'lapras', 'gyarados', 'vaporeon',
    'jolteon', 'flareon', 'raichu', 'slowpoke', 'psyduck',
    'bulbasaur', 'charmander', 'squirtle', 'jigglypuff', 'onix',
    'haunter', 'starmie', 'exeggutor', 'rhydon', 'aerodactyl'
  ];

  // Variables globales
  let tousLesPokemons = [];   // données API chargées
  let pokemonsFiltres = [];   // liste affichée après recherche
  let pokemonChoisi = null;   // le pokemon du joueur
  let pokemonBot = null;      // le pokemon du bot

  let hpJoueur = 300;
  let hpBot = 300;
  const HP_MAX = 300;

  // ETAPE 1 : Charger les Pokemons depuis l'API
  async function chargerPokemons() {
    // On charge chaque pokemon en parallèle
    const resultats = await Promise.all(
      LISTE_NOMS.map(nom =>
        fetch(`https://pokeapi.co/api/v2/pokemon/${nom}`)
          .then(r => r.json())
          .catch(() => null)  // si erreur, on ignore ce pokemon
      )
    );

    // On garde uniquement ceux qui ont chargé
    tousLesPokemons = resultats.filter(p => p !== null);
    pokemonsFiltres = tousLesPokemons;

    afficherListe(tousLesPokemons);
  }

  // ETAPE 2 : Afficher la liste de Pokemons
  // Retourne l'URL du sprite depuis le CDN officiel Pokemon
  // L'ID est paddé sur 3 chiffres : pikachu=25 -> "025"
  function spriteUrl(id) {
    const padded = String(id).padStart(3, '0');
    return `https://assets.pokemon.com/assets/cms2/img/pokedex/full/${padded}.png`;
  }

  function afficherListe(liste) {
    const conteneur = document.getElementById('liste-pokemon');

    if (liste.length === 0) {
      conteneur.innerHTML = '<p>Aucun résultat</p>';
      return;
    }

    // On crée une carte HTML pour chaque pokemon
    conteneur.innerHTML = liste.map(p => `
      <div class="carte-pokemon ${pokemonChoisi && pokemonChoisi.name === p.name ? 'selectionne' : ''}"
           id="carte-${p.name}"
           onclick="choisirPokemon('${p.name}')">
        <img src="${spriteUrl(p.id)}"
             onerror="this.style.display='none'"
             alt="${p.name}" />
        <p>${p.name}</p>
      </div>
    `).join('');
  }
  // ETAPE 3 : Filtrer selon la recherche
  function filtrer(texte) {
    pokemonsFiltres = tousLesPokemons.filter(p =>
      p.name.includes(texte.toLowerCase())
    );
    afficherListe(pokemonsFiltres);
  }

  // ETAPE 4 : Sélectionner un Pokemon
  function choisirPokemon(nom) {
    pokemonChoisi = tousLesPokemons.find(p => p.name === nom);

    // Met à jour l'affichage
    document.querySelectorAll('.carte-pokemon').forEach(c => c.classList.remove('selectionne'));
    const carte = document.getElementById(`carte-${nom}`);
    if (carte) carte.classList.add('selectionne');

    document.getElementById('btn-combat').disabled = false;
  }
  
  // ETAPE 5 : Charger 5 attaques pour un Pokemon
  async function chargerAttaques(pokemon) {
    const attaques = [];

    // On essaie de charger les 20 premières attaques
    for (const slot of pokemon.moves.slice(0, 20)) {
      if (attaques.length >= 5) break;

      try {
        const rep = await fetch(slot.move.url);
        const data = await rep.json();

        // On garde l'attaque seulement si elle a une puissance et une précision
        if (data.power && data.accuracy && data.pp) {
          attaques.push({
            nom: data.name,
            puissance: data.power,
            precision: data.accuracy,
            pp: data.pp,
            ppRestants: data.pp
          });
        }
      } catch (e) {
        // Si erreur sur une attaque, on passe à la suivante
      }
    }

    return attaques;
  }

  // ETAPE 6 : Démarrer le combat
  async function demarrerCombat() {
    document.getElementById('btn-combat').disabled = true;
    document.getElementById('btn-combat').textContent = 'Chargement...';

    // Choisir un bot aléatoire (différent du joueur)
    const autresNoms = LISTE_NOMS.filter(n => n !== pokemonChoisi.name);
    const nomBot = autresNoms[Math.floor(Math.random() * autresNoms.length)];
    const repBot = await fetch(`https://pokeapi.co/api/v2/pokemon/${nomBot}`);
    pokemonBot = await repBot.json();

    // Charger les attaques
    const attaquesJoueur = await chargerAttaques(pokemonChoisi);
    const attaquesBot = await chargerAttaques(pokemonBot);
    pokemonChoisi.attaques = attaquesJoueur;
    pokemonBot.attaques = attaquesBot;

    // Réinitialiser les HP
    hpJoueur = HP_MAX;
    hpBot = HP_MAX;

    // Afficher les infos de combat
    document.getElementById('nom-joueur').textContent = pokemonChoisi.name;
    document.getElementById('img-joueur').src = `https://assets.pokemon.com/assets/cms2/img/pokedex/full/${String(pokemonChoisi.id).padStart(3,"0")}.png`;
    document.getElementById('nom-bot').textContent = pokemonBot.name;
    document.getElementById('img-bot').src = `https://assets.pokemon.com/assets/cms2/img/pokedex/full/${String(pokemonBot.id).padStart(3,"0")}.png`;

    mettreAJourBarres();
    afficherAttaques();

    // Changer d'écran
    document.getElementById('selection').style.display = 'none';
    document.getElementById('combat').style.display = 'block';
    afficherJournal('Le combat commence ! Choisis une attaque.');
  }

  // ETAPE 7 : Afficher les boutons d'attaque
  function afficherAttaques() {
    const grille = document.getElementById('grille-attaques');

    grille.innerHTML = pokemonChoisi.attaques.map((a, i) => `
      <button class="bouton-attaque" id="attaque-${i}" onclick="joueurAttaque(${i})">
        <b>${a.nom.replace(/-/g, ' ')}</b>
        <span>PWR ${a.puissance} | ACC ${a.precision}% | PP ${a.ppRestants}/${a.pp}</span>
      </button>
    `).join('');
  }

  // ETAPE 8 : Le joueur attaque
  function joueurAttaque(index) {
    // Désactiver les boutons pendant l'animation
    bloquerBoutons(true);

    const attaque = pokemonChoisi.attaques[index];
    let messages = [];

    // --- Attaque du joueur ---
    const resultatJoueur = calculerAttaque(attaque, 'Toi', 'bot');
    messages.push(resultatJoueur.message);
    if (!resultatJoueur.pasAttaque) attaque.ppRestants--;

    // Vérifier si le bot est KO
    if (hpBot <= 0) {
      afficherAttaques();
      afficherJournal(messages.join('<br>'));
      setTimeout(() => finCombat(true), 800);
      return;
    }

    // --- Attaque du bot ---
    // Le bot choisit une attaque aléatoire
    // La règle : le bot ne peut attaquer que si ses PP >= PP restants du joueur
    const attaquesValides = pokemonBot.attaques.filter(a =>
      a.ppRestants > 0 && a.ppRestants >= attaque.ppRestants
    );

    // Si pas d'attaque valide, on prend n'importe laquelle avec PP > 0
    const choixBot = attaquesValides.length > 0
      ? attaquesValides[Math.floor(Math.random() * attaquesValides.length)]
      : pokemonBot.attaques.find(a => a.ppRestants > 0);

    if (choixBot) {
      const resultatBot = calculerAttaque(choixBot, pokemonBot.name, 'joueur');
      messages.push(resultatBot.message);
      if (!resultatBot.pasAttaque) choixBot.ppRestants--;
    } else {
      messages.push(`${pokemonBot.name} n'a plus de PP !`);
    }

    // Mettre à jour l'affichage
    afficherAttaques();
    afficherJournal(messages.join('<br>'));
    mettreAJourBarres();

    // Vérifier si le joueur est KO
    if (hpJoueur <= 0) {
      setTimeout(() => finCombat(false), 800);
      return;
    }

    bloquerBoutons(false);
  }

  // ETAPE 9 : Calculer une attaque
  function calculerAttaque(attaque, attaquant, cible) {
    // Vérifier PP
    if (attaque.ppRestants <= 0) {
      return {
        message: `${attaquant} essaie <b>${attaque.nom.replace(/-/g,' ')}</b> mais n'a plus de PP !`,
        pasAttaque: true
      };
    }

    // Vérifier la précision (ex: 80% = 80% de chance de toucher)
    const touche = Math.random() * 100 < attaque.precision;

    if (!touche) {
      return {
        message: `${attaquant} utilise <b>${attaque.nom.replace(/-/g,' ')}</b>... raté !`,
        pasAttaque: false
      };
    }

    // Calculer les dégâts avec un peu d'aléatoire (±15%)
    const degats = Math.round(attaque.puissance * (0.85 + Math.random() * 0.3));

    // Appliquer les dégâts
    if (cible === 'bot') {
      hpBot = Math.max(0, hpBot - degats);
    } else {
      hpJoueur = Math.max(0, hpJoueur - degats);
    }

    mettreAJourBarres();

    return {
      message: `${attaquant} utilise <b>${attaque.nom.replace(/-/g,' ')}</b> : <b>${degats} dégâts !</b>`,
      pasAttaque: false
    };
  }
  // ETAPE 10 : Mettre à jour les barres de vie
  function mettreAJourBarres() {
    // Joueur
    const pctJoueur = (hpJoueur / HP_MAX) * 100;
    document.getElementById('barre-joueur').style.width = pctJoueur + '%';
    document.getElementById('barre-joueur').style.background = couleurHP(pctJoueur);
    document.getElementById('hp-joueur').textContent = `${hpJoueur} / ${HP_MAX}`;

    // Bot
    const pctBot = (hpBot / HP_MAX) * 100;
    document.getElementById('barre-bot').style.width = pctBot + '%';
    document.getElementById('barre-bot').style.background = couleurHP(pctBot);
    document.getElementById('hp-bot').textContent = `${hpBot} / ${HP_MAX}`;
  }

  function couleurHP(pourcentage) {
    if (pourcentage > 50) return 'green';
    if (pourcentage > 25) return 'orange';
    return 'red';
  }

  // UTILITAIRES
  function afficherJournal(texte) {
    document.getElementById('journal').innerHTML = texte;
  }

  function bloquerBoutons(etat) {
    document.querySelectorAll('.bouton-attaque').forEach(b => b.disabled = etat);
  }

  function finCombat(joueurGagne) {
    document.getElementById('combat').style.display = 'none';
    document.getElementById('resultat').style.display = 'block';

    if (joueurGagne) {
      document.getElementById('res-emoji').textContent = '🏆';
      document.getElementById('res-titre').textContent = 'Tu as gagné !';
      document.getElementById('res-texte').textContent =
        `${pokemonChoisi.name} a battu ${pokemonBot.name} !`;
    } else {
      document.getElementById('res-emoji').textContent = '💀';
      document.getElementById('res-titre').textContent = 'Tu as perdu !';
      document.getElementById('res-texte').textContent =
        `${pokemonBot.name} était trop fort. Réessaie !`;
    }
  }

  function rejouer() {
    document.getElementById('resultat').style.display = 'none';
    document.getElementById('selection').style.display = 'block';
    document.getElementById('btn-combat').disabled = false;
    document.getElementById('btn-combat').textContent = 'Combattre !';
    pokemonChoisi = null;
    afficherListe(tousLesPokemons);
  }
  // LANCEMENT : charger les Pokemons au démarrage
  chargerPokemons();
</script>

</body>
</html>
